steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID}'
      - '--build-arg'
      - 'VITE_GOOGLE_CLIENT_ID=${_VITE_GOOGLE_CLIENT_ID}'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}'
      - '--build-arg'
      - 'VITE_GROQ_API_KEY=${_VITE_GROQ_API_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dhillichythanya:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dhillichythanya:latest'
      - '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/dhillichythanya:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dhillichythanya'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dhillichythanya:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'gcr.io/$PROJECT_ID/dhillichythanya:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/dhillichythanya:latest'

# substitutions:
#   Configure these as substitution variables in your Cloud Build trigger settings
#   _VITE_FIREBASE_API_KEY: 'your-firebase-api-key'
#   _VITE_FIREBASE_AUTH_DOMAIN: 'your-auth-domain'
#   _VITE_FIREBASE_PROJECT_ID: 'your-project-id'
#   _VITE_FIREBASE_STORAGE_BUCKET: 'your-storage-bucket'
#   _VITE_FIREBASE_MESSAGING_SENDER_ID: 'your-sender-id'
#   _VITE_FIREBASE_APP_ID: 'your-app-id'
#   _VITE_FIREBASE_MEASUREMENT_ID: 'your-measurement-id'
#   _VITE_GOOGLE_CLIENT_ID: 'your-google-client-id'
#   _VITE_GEMINI_API_KEY: 'your-gemini-api-key'
#   _VITE_GROQ_API_KEY: 'your-groq-api-key'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
